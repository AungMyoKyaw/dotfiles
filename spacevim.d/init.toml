# All SpaceVim option below [option] section
[options]
  background                     = "dark"
  bootstrap_after                = "myspacevim#after"
  bootstrap_before               = "myspacevim#before"
  buffer_index_type              = 4
  colorscheme                    = "onedark"
  enable_guicolors               = true
  enable_statusline_display_mode = false
  enable_tabline_filetype_icon   = true
  statusline_inactive_separator  = "curve"
  statusline_separator           = "curve"
  filetree_direction             = "right"
  autocomplete_method            = "coc"

# One Dark Theme
[[custom_plugins]]
  name = "joshdick/onedark.vim"
  merged = 0

# Better default config for vim and neovim.
[[layers]]
  name = "default"

# VersionControl
[[layers]]
  name = "VersionControl"
  enable-gtm-status =  true

# FZF
[[layers]]
  name = "fzf"

# VIM POLY-GLOT
[[custom_plugins]]
  name = "sheerun/vim-polyglot"
  merged = 0

# EMMET
[[custom_plugins]]
  name = "mattn/emmet-vim"
  merged = 0

# PRETTIER
[[custom_plugins]]
  name = "prettier/vim-prettier"
  merged = 0

# VIMWIKI
[[custom_plugins]]
  name = "vimwiki/vimwiki"
  merged = 0

# CTRLSF
[[custom_plugins]]
  name = "dyng/ctrlsf.vim"
  merged = 0

# JS DOC
[[custom_plugins]]
  name = "heavenshell/vim-jsdoc"
  merged = 0
