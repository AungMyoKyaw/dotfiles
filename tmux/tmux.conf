# TMUX prefix
set-option -g prefix C-a
unbind C-b

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# THEMES PLUGINS
# set -g @plugin 'odedlaz/tmux-onedark-theme'
# set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @colors-solarized '256'
# set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @plugin 'dracula/tmux'

# ----------
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'sainnhe/tmux-fzf'

TMUX_FZF_MENU=\
"switch window\n~/.tmux/plugins/tmux-fzf/scripts/window.sh switch\n"
TMUX_FZF_OPTIONS="-p -w 62% -h 68% -m"

# TMUX_FZF_MENU=\
# "foo\necho 'Hello!'\n"\
# "bar\nls ~\n"\
# "sh\nsh ~/test.sh\n"

### THEME ###
# TokyoNight colors for Tmux

# set -g mode-style "fg=#82aaff,bg=#3b4261"
set -g mode-style "fg=#82aaff,bg=default"

set -g message-style "fg=#82aaff,bg=#3b4261"
set -g message-command-style "fg=#82aaff,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#82aaff,bg=#1e2030"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1b1d2b,bg=#82aaff,bold] #S #[fg=#82aaff,bg=#1e2030,nobold,nounderscore,noitalics]î‚°"
set -g status-right "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]î‚˛#[fg=#82aaff,bg=#1e2030] #{prefix_highlight} #[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]î‚˛#[fg=#82aaff,bg=#3b4261] %Y-%m-%d î‚ł %I:%M %p #[fg=#82aaff,bg=#3b4261,nobold,nounderscore,noitalics]î‚˛#[fg=#1b1d2b,bg=#82aaff,bold] #h "

setw -g window-status-activity-style "underscore,fg=#828bb8,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030"
setw -g window-status-format "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]î‚°#[default] #I î‚± #W #F #[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]î‚°"
setw -g window-status-current-format "#[fg=#1e2030,bg=#3b4261,nobold,nounderscore,noitalics]î‚°#[fg=#82aaff,bg=#3b4261,bold] #I î‚± #W #F #[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]î‚°"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#ffc777]#[bg=#1e2030]î‚˛#[fg=#1e2030]#[bg=#ffc777]"
set -g @prefix_highlight_output_suffix "î‚˛"
# END THEME SECTON

# Save Interval
set -g @continuum-save-interval '5'

# Auto Restore
# set -g @continuum-restore 'on'

# save session for vim
set -g @resurrect-strategy-vim 'session'
# save sesson for neovim
set -g @resurrect-strategy-nvim 'session'

# resurrect dir
set -g @resurrect-dir '~/tmux-resurrect/recurrect'

# Enable TRUE COLOR
# run echo $TERM outside of tmux
# replace XXX with $TERM vlaue
# set-option -sa terminal-overrides ',XXX:RGB'
# set-option -sa terminal-overrides ',XXX:RGB'
# set-option -sa terminal-overrides ',xterm-256color:Tc'
# set-option  -ga terminal-overrides  ",xterm-kitty:Tc"
set-option -ga terminal-overrides ',xterm-256color:RGB'
# set -g default-terminal 'screen-256color'
# set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",*256col*:Tc"
# set -g default-terminal "screen-256color"
# set -ga terminal-overrides ",screen-256color:Tc"
# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1

setw -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# enable activity alerts [ from tmux productive mouse free development ]
setw -g monitor-activity on
set -g visual-activity on

# auto rename window
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# onedark timeformat
# set -g @onedark_time_format "%I:%M %p"
# set -g @onedark_widgets "#(date)"

# use vi style keybinding
setw -g mode-keys vi

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
