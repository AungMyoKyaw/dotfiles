# TMUX prefix
set-option -g prefix C-a
unbind C-b

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# themes
# set -g @plugin 'odedlaz/tmux-onedark-theme'
# set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @colors-solarized '256'
# set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @plugin 'dracula/tmux'

# ----------
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'sainnhe/tmux-fzf'

TMUX_FZF_MENU=\
"switch window\n~/.tmux/plugins/tmux-fzf/scripts/window.sh switch\n"
TMUX_FZF_OPTIONS="-p -w 62% -h 68% -m"

# TMUX_FZF_MENU=\
# "foo\necho 'Hello!'\n"\
# "bar\nls ~\n"\
# "sh\nsh ~/test.sh\n"

# theme settings
################################################################################
### PLUGINS ###
set -g @plugin 'o0th/tmux-nova'
# set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'ofirgall/tmux-keyboard-layout'

### THEME ###
set -g @nova-nerdfonts false
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 

set -g @nova-pane "#I #W"
set -g @nova-rows 0

### COLORS ###
b_bg="#504945"

seg_a="#a89984 #282828"
seg_b="$b_bg #ddc7a1"

inactive_bg="#32302f"
inactive_fg="#ddc7a1"
active_bg=$b_bg
active_fg="#ddc7a1"

set -gw window-status-current-style bold
set -g "@nova-status-style-bg" "$inactive_bg"
set -g "@nova-status-style-fg" "$inactive_fg"
set -g "@nova-status-style-active-bg" "$active_bg"
set -g "@nova-status-style-active-fg" "$active_fg"

set -g "@nova-pane-active-border-style" "#44475a"
set -g "@nova-pane-border-style" "#827d51"

### STATUS BAR ###
set -g @nova-segment-prefix "#{?client_prefix,PREFIX,}"
set -g @nova-segment-prefix-colors "$seg_b"

set -g @nova-segment-session "#{session_name}"
set -g @nova-segment-session-colors "$seg_a"

set -g @nova-segment-whoami "#(whoami)@#h"
set -g @nova-segment-whoami-colors "$seg_a"

# set -g @nova-segment-cpu " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh)"
# set -g @nova-segment-cpu-colors "$seg_b"

set -g @nova-segment-awesome "awesome"
set -g @nova-segment-awesome-colors "$seg_a"

set -g @nova-segment-snowflake ""
set -g @nova-segment-snowflake-colors "$seg_b"

set -g @batt_icon_status_charging '↑'
set -g @batt_icon_status_discharging '↓'
set -g @nova-segment-battery "#{battery_icon_status} #{battery_percentage}"
set -g @nova-segment-battery-colors "$seg_b"

# set -g @nova-segment-layout "#(~/.tmux/plugins/tmux-keyboard-layout/scripts/get_keyboard_layout.sh)"
# set -g @nova-segment-layout-colors "$seg_a"

set -g @nova-segments-0-left "session"
# set -g @nova-segments-0-right "prefix cpu battery awesome"
set -g @nova-segments-0-right "prefix snowflake battery awesome"
################################################################################
# end theme secton

# Save Interval
set -g @continuum-save-interval '5'

# Auto Restore
# set -g @continuum-restore 'on'

# save session for vim
set -g @resurrect-strategy-vim 'session'
# save sesson for neovim
set -g @resurrect-strategy-nvim 'session'

# resurrect dir
set -g @resurrect-dir '~/tmux-resurrect/recurrect'

# Enable TRUE COLOR
# run echo $TERM outside of tmux
# replace XXX with $TERM vlaue
# set-option -sa terminal-overrides ',XXX:RGB'
# set-option -sa terminal-overrides ',XXX:RGB'
# set-option -sa terminal-overrides ',xterm-256color:Tc'
# set-option  -ga terminal-overrides  ",xterm-kitty:Tc"
set-option -ga terminal-overrides ',xterm-256color:RGB'
# set -g default-terminal 'screen-256color'
# set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",*256col*:Tc"
# set -g default-terminal "screen-256color"
# set -ga terminal-overrides ",screen-256color:Tc"
# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1

setw -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# enable activity alerts [ from tmux productive mouse free development ]
setw -g monitor-activity on
set -g visual-activity on

# auto rename window
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# onedark timeformat
# set -g @onedark_time_format "%I:%M %p"
# set -g @onedark_widgets "#(date)"

# use vi style keybinding
setw -g mode-keys vi

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
